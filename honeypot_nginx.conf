# IoT Honeypot - Nginx Reverse Proxy Configuration
# Place this at: /etc/nginx/sites-available/honeypot
# 
# Purpose: Serve both HTTP (80) and HTTPS (443) traffic,
# forward all requests to Flask on internal port 5000.
# This is how real IoT devices and enterprise honeypots handle TLS.

# Hide Nginx version from response headers (anti-fingerprinting)
server_tokens off;

# proxy_pass_header Server (in location blocks below) tells Nginx to
# pass Flask's persona header (e.g. "Cisco-HTTP/1.1") to the client
# instead of Nginx's default "Server: nginx" header.

# ── DDoS Safety Net (Layer 1) ──
# Hard limit: 30 requests/second per IP with burst tolerance of 60.
# This is a FIXED circuit breaker — not user-configurable.
# Drops flood traffic in C before it reaches Python/SQLite.
# Normal pen-testing tools (Nmap, Hydra, Gobuster) stay well under this.
# Python's rate limiter (Layer 2) handles educational rate limiting.
limit_req_zone $binary_remote_addr zone=honeypot_safety:10m rate=30r/s;

# --- HTTP (Port 80) ---
# Attackers hitting port 80 get proxied directly to Flask.
# No redirect to HTTPS — real IoT devices serve HTTP on port 80.
server {
    listen 80;
    server_name _;

    location / {
        # Apply DDoS safety limit (burst=60 allows short spikes like Nmap)
        # nodelay = don't queue excess requests, drop them immediately
        limit_req zone=honeypot_safety burst=60 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;
        proxy_pass_header Server;
        
        # Don't buffer — keep low latency for real-time logging
        proxy_buffering off;
    }
}

# --- HTTPS (Port 443) ---
# Self-signed cert simulates an IoT device with basic TLS.
# Many routers and cameras offer HTTPS on 443 with self-signed certs.
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/honeypot.crt;
    ssl_certificate_key /etc/nginx/ssl/honeypot.key;

    # Accept older TLS for maximum attacker compatibility
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        limit_req zone=honeypot_safety burst=60 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;
        proxy_pass_header Server;
        proxy_buffering off;
    }
}