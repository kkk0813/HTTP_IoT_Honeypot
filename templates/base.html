<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IoT Honeypot{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r p-6 flex flex-col shadow-sm">
        <div class="flex items-center gap-2 mb-8 font-bold text-blue-900">
            <span class="text-xl">🍯</span> IoT Honeypot
        </div>
        
        <nav class="flex-1 space-y-2 text-sm">
            <a href="/dashboard" class="block px-3 py-2 rounded {% if active_page == 'dashboard' %}bg-blue-100 text-blue-900 font-medium{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
                Dashboard
            </a>
            <a href="/logs" class="block px-3 py-2 rounded {% if active_page == 'logs' %}bg-blue-100 text-blue-900 font-medium{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
                Attack Logs
            </a>
            <a href="/simulation" class="block px-3 py-2 rounded {% if active_page == 'simulation' %}bg-blue-100 text-blue-900 font-medium{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
                Simulation Lab
            </a>
            <a href="/settings" class="block px-3 py-2 rounded {% if active_page == 'settings' %}bg-blue-100 text-blue-900 font-medium{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
                ⚙️ Settings
            </a>
        </nav>

        <div class="mt-auto space-y-3 pt-4 border-t">
            <!-- Deployment Mode Indicator -->
            <div id="mode-box" class="p-3 bg-gradient-to-br from-blue-50 to-purple-50 rounded border-2 border-blue-200">
                <p class="text-gray-500 font-bold uppercase mb-1 text-[9px]">Deployment Mode</p>
                <div id="mode-indicator" class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                    <span class="text-xs font-bold text-blue-900">SIMULATION</span>
                </div>
            </div>

            <!-- Threat Level / Training Mode Indicator -->
            <div id="threat-box" class="p-3 bg-gray-50 rounded border text-[10px]">
                <p id="threat-label" class="text-gray-400 font-bold uppercase mb-1">System Mode</p>
                <div id="threat-content">
                    <div class="flex items-center gap-2">
                        <span class="text-lg">🎓</span>
                        <span class="text-sm font-bold text-blue-700">TRAINING</span>
                    </div>
                    <p class="text-[9px] text-gray-400 mt-1">Lab exercises only</p>
                </div>
            </div>

            <!-- System Status -->
            <div class="p-3 bg-gray-50 rounded border text-[10px]">
                <p class="text-gray-400 font-bold uppercase mb-1">System Status</p>
                <div class="flex items-center gap-2 font-bold text-green-600">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> OPERATIONAL
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-hidden">
        {% block content %}{% endblock %}
    </main>

    <!-- Shared JavaScript -->
    <script>
        // Update sidebar based on deployment mode
        function updateSidebar() {
            fetch('/api/config')
                .then(res => res.json())
                .then(config => {
                    const modeBox = document.getElementById('mode-box');
                    const modeIndicator = document.getElementById('mode-indicator');
                    const threatBox = document.getElementById('threat-box');
                    const threatLabel = document.getElementById('threat-label');
                    const threatContent = document.getElementById('threat-content');
                    
                    if (config.mode === 'internet') {
                        // INTERNET MODE - Show real threat level
                        modeIndicator.innerHTML = `
                            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                            <span class="text-xs font-bold text-red-900">INTERNET</span>
                        `;
                        modeBox.classList.remove('from-blue-50', 'to-purple-50', 'border-blue-200');
                        modeBox.classList.add('from-red-50', 'to-orange-50', 'border-red-300');
                        
                        // Fetch and show real threat level
                        threatLabel.textContent = 'Threat Level';
                        threatBox.classList.remove('bg-gray-50', 'border');
                        threatBox.classList.add('bg-gradient-to-br', 'from-red-50', 'to-orange-50', 'border-2', 'border-red-200');
                        
                        // Fetch threat level from stats
                        fetch('/api/stats')
                            .then(res => res.json())
                            .then(stats => {
                                const threat = stats.threat || 'LOW';
                                const colors = {
                                    'LOW': { text: 'text-green-700', bg: 'bg-green-100' },
                                    'MEDIUM': { text: 'text-orange-700', bg: 'bg-orange-100' },
                                    'HIGH': { text: 'text-red-700', bg: 'bg-red-100' }
                                };
                                const c = colors[threat] || colors['LOW'];
                                
                                threatContent.innerHTML = `
                                    <h4 class="text-lg font-black ${c.text} uppercase">${threat}</h4>
                                    <p class="text-[9px] text-gray-500 mt-1">Live threat assessment</p>
                                `;
                            });
                    } else {
                        // SIMULATION MODE - Show training indicator
                        modeIndicator.innerHTML = `
                            <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                            <span class="text-xs font-bold text-blue-900">SIMULATION</span>
                        `;
                        modeBox.classList.remove('from-red-50', 'to-orange-50', 'border-red-300');
                        modeBox.classList.add('from-blue-50', 'to-purple-50', 'border-blue-200');
                        
                        // Show static training mode
                        threatLabel.textContent = 'System Mode';
                        threatBox.classList.remove('bg-gradient-to-br', 'from-red-50', 'to-orange-50', 'border-2', 'border-red-200');
                        threatBox.classList.add('bg-gray-50', 'border');
                        
                        threatContent.innerHTML = `
                            <div class="flex items-center gap-2">
                                <span class="text-lg">🎓</span>
                                <span class="text-sm font-bold text-blue-700">TRAINING</span>
                            </div>
                            <p class="text-[9px] text-gray-400 mt-1">Lab exercises only</p>
                        `;
                    }
                })
                .catch(err => console.log('Config not available yet'));
        }

        // Call on page load
        updateSidebar();
        setInterval(updateSidebar, 10000); // Check every 10 seconds
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
