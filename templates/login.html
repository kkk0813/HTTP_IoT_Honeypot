<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ persona_name }}</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a237e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .error-msg { color: #ff5252; background: #ffebee; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 13px; display: none; }
        .footer-info { margin-top: 20px; font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="font-bold text-xl text-blue-900 mb-2">{{ persona_name }}</h2>
        <p class="text-gray-500 text-sm mb-6">Administration Portal</p>
        
        <div id="error" class="error-msg">Invalid username or password. Please try again.</div>

        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="footer-info">
            Device Status: Active | Authorized Access Only<br>
            &copy; 2026 {{ vendor }} Networks
        </div>
    </div>

    <script>
        if (window.location.search.includes('error')) {
            document.getElementById('error').style.display = 'block';
        }
    </script>
</body>
</html>
